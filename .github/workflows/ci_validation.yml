# adapted from https://github.com/spacetelescope/notebook-ci-actions

name: ci_validation 

on:
    push:
      branches: [ "bw-nb-ci" ]

permissions: write-all

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: "3.12"
    - name: Add conda to system path
      run: |
        # $CONDA is an environment variable pointing to the root of the miniconda directory
        echo $CONDA/bin >> $GITHUB_PATH
    - name: Install dependencies
      run: |
        conda env create -f environment.yml
        conda activate exocore
        conda install nbconvert
    - name: Gather changed notebooks
      id: changed-files
      uses: tj-actions/changed-files@v44.5.2
      with:
        files: |
          **/*.ipynb
    - name: Executing changed notebooks
      run: |
        for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
          echo "$file was updated, executing notebook"
          run: | 
            jupyter nbconvert --template classic --to html --execute $file
        done
